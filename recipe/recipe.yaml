# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  name: pixi-build-rattler-build
  crate_name: pixi_build_rattler_build
  version: "0.3.10"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/prefix-dev/pixi/archive/refs/tags/${{ name }}-v${{ 
    version }}.tar.gz
  sha256: 43334dbcd764127b57b9ddf5d0860fa1c464ac4757cae8984ddfbd5a3839ea82

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
    - if: osx and x86_64
      then:
          # use the default linker for osx-64 as we are hitting a bug with the conda-forge linker
          # https://github.com/rust-lang/rust/issues/140686
      - unset CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER

    - if: unix
      then:
      - export OPENSSL_DIR="$PREFIX"
    - if: win
      then:
      - set CARGO_HOME=C:\.cargo
      - md %CARGO_HOME%
    - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} 
      --path crates/${{ crate_name }} --no-default-features --features 
      native-tls
    - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
  files:
  - bin/${{ name }}
  - bin/${{ name }}.exe

requirements:
  build:
  - ${{ compiler("rust") }}
  - ${{ stdlib("c") }}
  - cargo-bundle-licenses
  - cargo-auditable
  host:
  - pkg-config
  - if: unix
    then: openssl
  run:
  - pixi-build-api-version >=4,<5

tests:
- script: ${{ name }} --help
- package_contents:
    bin:
    - ${{ name }}

about:
  homepage: https://github.com/prefix-dev/pixi
  summary: A pixi build backend to build recipe.yaml files.
  description: |
    This package provides a build backend for pixi that allows building recipe.yaml files.
  license: BSD-3-Clause
  license_file:
  - LICENSE
  - THIRDPARTY.yml
  documentation: https://pixi.prefix.dev/latest/build/backends/pixi-build-rattler-build/
  repository: https://github.com/prefix-dev/pixi

extra:
  recipe-maintainers:
  - baszalmstra
  - ruben-arts
  - Hofer-Julian
